<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Cockpit</title>
    <link rel="stylesheet" href="/static/css/base.css">
</head>
<body>
    <canvas id="hex-bg"></canvas>

    <!-- Top bar -->
    <div class="topbar">
        <div class="topbar-left">
            <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">&#9776;</button>
            <div class="topbar-logo">Claude <span>Cockpit</span></div>
        </div>
        <div class="topbar-right">
            <select class="theme-picker" id="theme-picker"></select>
            <select class="model-select" id="model-select">
                <option value="sonnet">Sonnet 4.6</option>
                <option value="opus">Opus 4.6</option>
                <option value="haiku">Haiku 4.5</option>
            </select>
            <div class="plan-badge" id="plan-badge" title="Using Claude monthly plan via CLI">Plan</div>
            <div class="user-info" id="user-info"></div>
            <a href="/logout" class="btn btn-sm">Logout</a>
        </div>
    </div>

    <!-- App container -->
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">Sessions</div>
            <div class="session-list" id="session-list"></div>
            <div class="sidebar-footer">
                <button class="btn btn-primary btn-block" id="new-session-btn">+ New Session</button>
            </div>
        </aside>

        <!-- Main content -->
        <div class="main">
            <div class="pane-container layout-1" id="pane-container">
                <!-- Panes injected by JS -->
            </div>
            <div class="status-bar">
                <div class="status-left">
                    <span>Tokens: <span class="stat-value" id="stat-tokens">0</span></span>
                    <span>Cost: <span class="stat-cost" id="stat-cost">$0.00</span></span>
                    <span>Sessions: <span class="stat-value" id="stat-sessions">0</span></span>
                </div>
                <div class="status-right">
                    <span id="stat-status">Ready</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Layout controls (floating) -->
    <div class="layout-controls" id="layout-controls">
        <button class="layout-btn active" data-layout="1" title="Single pane">&#11036;</button>
        <button class="layout-btn" data-layout="2" title="Two panes">&#11036;&#11036;</button>
        <button class="layout-btn" data-layout="4" title="Four panes">&#8862;</button>
    </div>

    <script src="/static/js/themes.js"></script>
    <script src="/static/js/hexgrid.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
