<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Cockpit — Login</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <style>
        body {
            overflow: auto;
        }
    </style>
</head>
<body>
    <canvas id="hex-bg"></canvas>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo">Claude <span>Cockpit</span></div>
            <div class="subtitle">Multi-session Claude Code manager</div>

            <div class="theme-picker-group">
                <label for="theme-select">Theme</label>
                <select id="theme-select" class="theme-select"></select>
            </div>

            <a href="/login" class="login-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign in with Google
            </a>

            <div class="footer">Secure authentication via Google OAuth 2.0</div>
        </div>
    </div>

    <script src="/static/js/themes.js"></script>
    <script src="/static/js/hexgrid.js"></script>
    <script>
        (function () {
            const CT = window.CockpitThemes;
            const HG = window.HexGrid;
            const select = document.getElementById('theme-select');

            // Populate theme picker
            CT.listThemes().forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = t.label + ' (' + t.group + ')';
                select.appendChild(opt);
            });

            // Restore saved theme or default
            const saved = CT.getSavedTheme() || 'tokyo-night-dark';
            select.value = saved;

            // Apply theme + init hexgrid
            CT.applyTheme(saved);
            HG.init('hex-bg');

            select.addEventListener('change', function () {
                CT.applyTheme(select.value);
            });
        })();
    </script>
</body>
</html>
