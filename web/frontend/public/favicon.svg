<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="hex-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <linearGradient id="inner-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
  </defs>
  <!-- Outer hexagon -->
  <path d="M16 1 L29.5 8.5 L29.5 23.5 L16 31 L2.5 23.5 L2.5 8.5 Z" fill="url(#hex-grad)" stroke="none"/>
  <!-- Inner hexagon (dark fill) -->
  <path d="M16 4 L27 10 L27 22 L16 28 L5 22 L5 10 Z" fill="url(#inner-grad)" stroke="none"/>
  <!-- Terminal prompt ">_" -->
  <path d="M9 12 L14 16 L9 20" fill="none" stroke="#7aa2f7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="16" y1="20" x2="23" y2="20" stroke="#bb9af7" stroke-width="2.2" stroke-linecap="round"/>
</svg>
